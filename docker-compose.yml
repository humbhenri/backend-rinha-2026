services:
  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - web-app
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: "50MB"
  web-app:
    build: ./app
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.45"
          memory: "150MB"
